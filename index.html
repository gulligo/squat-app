<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>용용이 스쿼트</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.png" type="image/png" />
<link rel="apple-touch-icon" href="icon.png" />
<style>
:root{
  --bg:#f7f1fb;
  --card:#ffffff;
  --line:#eadcf6;
  --primary:#8d4dff;
  --primary2:#c48bff;
  --text:#333;
  --muted:#8d7f99;
  --orange:#ff8a2a;
  --green:#19c37d;
  --soft-pink:#f6d7de;
  --soft-pink-2:#f3c9d3;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.top-tabs{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  background:#fff;
  border-bottom:2px solid var(--line);
}
.top-tabs button{
  flex:1;
  border:none;
  background:none;
  padding:16px 4px;
  font-size:15px;
  font-weight:700;
  color:#666;
}
.top-tabs button.active{
  color:var(--primary);
  border-bottom:4px solid var(--primary);
}
.page{display:none;padding:14px 14px 160px}
.page.active{display:block}
.card{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.goal-row{margin-bottom:14px}
.goal-head{font-size:14px;color:#999;margin-bottom:6px}
.goal-line{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.goal-num{font-size:20px;font-weight:900}
.goal-input{
  width:92px;
  height:40px;
  border-radius:16px;
  border:2px solid var(--line);
  text-align:center;
  font-size:18px;
  font-weight:800;
  color:#444;
  background:#faf7ff;
}
.bar{
  height:16px;
  background:#efe6f8;
  border-radius:999px;
  overflow:hidden;
}
.bar > div{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--primary),var(--primary2));
  transition:width .25s;
}
.monthbar > div{
  background:linear-gradient(90deg,#2ec5c0,#2fdb91);
}
.hero{
  text-align:center;
  padding:28px 14px 18px;
}
.hero-label{font-size:14px;color:#bbb;margin-bottom:8px}
.hero-count{
  font-size:110px;
  line-height:1;
  color:var(--primary);
  font-weight:900;
}
.hero-unit{
  font-size:18px;
  color:#9d74d4;
  font-weight:800;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini-title{font-size:14px;color:#b0a2bc;margin-bottom:10px}
.mini-value{font-size:34px;font-weight:900;line-height:1.1}
.orange{color:var(--orange)}
.green{color:var(--green)}
.purple{color:var(--primary)}
.streak{
  display:grid;
  grid-template-columns:1fr 1px 1fr;
  align-items:center;
  gap:12px;
}
.divider{height:76px;background:#eee}
.center{text-align:center}
.small{font-size:12px;color:#b7aabc}
.btn-hide-row{display:flex;justify-content:center;margin:8px 0 16px}
.btn-hide{
  border:none;
  background:#f0e5fb;
  color:var(--primary);
  padding:12px 18px;
  border-radius:999px;
  font-weight:800;
  font-size:14px;
}
.main-wrap{display:flex;justify-content:center;margin-top:10px}
.squat-btn{
  width:240px;
  height:240px;
  border-radius:50%;
  border:8px solid #fff;
  box-shadow:0 0 0 8px #ffd2ef,0 10px 28px rgba(236,72,153,.22);
  overflow:hidden;
  background:#fff;
}
.squat-btn img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.settings-list .row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid #f0e8f8;
}
.settings-list .row:last-child{border-bottom:none}
.toggle{
  width:54px;
  height:32px;
  border-radius:999px;
  background:#ddd;
  position:relative;
  border:none;
}
.toggle::after{
  content:"";
  position:absolute;
  top:4px;
  left:4px;
  width:24px;
  height:24px;
  border-radius:50%;
  background:#fff;
  transition:.2s;
}
.toggle.on{background:var(--primary)}
.toggle.on::after{left:26px}
.voice-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  background:#f1ebf8;
  color:#666;
  font-weight:700;
}
.chip.active{background:var(--primary);color:#fff}

.section-title{font-size:18px;font-weight:900;margin:0 0 12px}
.calendar-card-title{
  font-size:18px;
  font-weight:900;
  margin-bottom:8px;
}
.calendar-streak{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  gap:12px;
}
.calendar-streak .box{
  flex:1;
  background:#fbf8ff;
  border:1px solid #f0e8f8;
  border-radius:18px;
  padding:12px 10px;
  text-align:center;
}
.calendar-streak .label{
  font-size:13px;
  color:#9d8cad;
  margin-bottom:4px;
}
.calendar-streak .value{
  font-size:28px;
  font-weight:900;
  color:var(--orange);
}
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px 6px;
}
.cal-head{
  text-align:center;
  font-size:13px;
  color:#7b6888;
  font-weight:800;
  margin-bottom:4px;
}
.day{
  min-height:110px;
  border-radius:16px;
  background:#fcfbfe;
  padding:6px 2px 8px;
  text-align:center;
}
.day.empty{background:transparent}
.day-num{
  font-size:14px;
  font-weight:800;
  color:#555;
  margin-bottom:6px;
}
.day-num.today{color:var(--primary)}
.bubble-wrap{
  height:62px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.bubble{
  border-radius:50%;
  background:linear-gradient(180deg,var(--soft-pink),var(--soft-pink-2));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
}
.day-count{
  margin-top:6px;
  font-size:12px;
  font-weight:800;
  color:#9a7faa;
  min-height:16px;
}

.chartWrap{
  display:flex;
  align-items:flex-end;
  gap:8px;
  height:220px;
  overflow-x:auto;
}
.barItem{min-width:30px;text-align:center}
.barCol{
  width:100%;
  background:linear-gradient(180deg,var(--primary2),var(--primary));
  border-radius:10px 10px 4px 4px;
  min-height:6px;
}
.barLbl{font-size:11px;color:#888;margin-top:6px}
.barVal{font-size:10px;color:#aaa;margin-bottom:4px}

.floating{
  position:fixed;
  right:18px;
  bottom:28px;
  z-index:99;
  width:170px;
  height:170px;
  border-radius:50%;
  border:none;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  background:#fff;
  overflow:hidden;
}
.floating img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.floating.hidden{opacity:.25}

.notice{
  position:fixed;
  left:50%;
  bottom:180px;
  transform:translateX(-50%);
  background:rgba(34,34,34,.92);
  color:#fff;
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:100;
  max-width:88vw;
  white-space:nowrap;
}
.notice.show{opacity:1}
</style>
</head>
<body>

<div class="top-tabs">
  <button class="tab active" data-page="home">스쿼트</button>
  <button class="tab" data-page="calendar">달력</button>
  <button class="tab" data-page="graph">그래프</button>
  <button class="tab" data-page="stats">통계</button>
  <button class="tab" data-page="settings">설정</button>
</div>

<div id="home" class="page active">
  <div class="goal-row">
    <div class="goal-head">📅 오늘 목표</div>
    <div class="goal-line">
      <div id="todayGoalNow" class="goal-num">0</div>
      <span>/</span>
      <input id="todayGoalInput" class="goal-input" type="number" min="1" value="300">
      <span>개</span>
    </div>
    <div class="bar"><div id="todayBar"></div></div>
  </div>

  <div class="goal-row">
    <div class="goal-head">📅 월 목표</div>
    <div class="goal-line">
      <div id="monthGoalNow" class="goal-num">0</div>
      <span>/</span>
      <input id="monthGoalInput" class="goal-input" type="number" min="1" value="10800">
      <span>개</span>
      <div id="monthPercent" class="goal-num orange" style="margin-left:auto;font-size:18px">0%</div>
    </div>
    <div class="bar monthbar"><div id="monthBar"></div></div>
  </div>

  <div class="card hero">
    <div class="hero-label">오늘 스쿼트</div>
    <div id="heroCount" class="hero-count">0</div>
    <div class="hero-unit">개</div>
  </div>

  <div class="grid2">
    <div class="card center">
      <div class="mini-title">한달 평균 개수</div>
      <div id="monthAvg" class="mini-value purple">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">연 평균 개수</div>
      <div id="yearAvg" class="mini-value purple">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">총합계 평균</div>
      <div id="allAvg" class="mini-value purple">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">일 최대</div>
      <div id="dayMax" class="mini-value orange">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">이번 달</div>
      <div id="monthTotal" class="mini-value green">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">전체 누적</div>
      <div id="allTotal" class="mini-value green">0</div>
    </div>
  </div>

  <div class="card streak">
    <div class="center">
      <div class="mini-title">🔥 현재 연속</div>
      <div id="currentStreak" class="mini-value orange">0</div>
      <div class="small">일</div>
    </div>
    <div class="divider"></div>
    <div class="center">
      <div class="mini-title">🏆 최고 연속</div>
      <div id="bestStreak" class="mini-value orange">0</div>
      <div class="small">일</div>
    </div>
  </div>

  <div class="btn-hide-row">
    <button id="hideFloatBtn" class="btn-hide">👆 버튼 숨기기</button>
  </div>

  <div class="main-wrap">
    <button id="mainBtn" class="squat-btn" aria-label="스쿼트 버튼">
      <img src="icon.png" alt="용용이">
    </button>
  </div>
</div>

<div id="calendar" class="page">
  <div class="card">
    <div class="calendar-card-title">이번 달 기록</div>
    <div class="calendar-streak">
      <div class="box">
        <div class="label">현재 연속</div>
        <div id="calCurrentStreak" class="value">0</div>
      </div>
      <div class="box">
        <div class="label">최고 연속</div>
        <div id="calBestStreak" class="value">0</div>
      </div>
    </div>
    <div id="calendarHeads" class="calendar-grid" style="margin-bottom:8px"></div>
    <div id="calendarGrid" class="calendar-grid"></div>
  </div>
</div>

<div id="graph" class="page">
  <div class="card">
    <h3 class="section-title">최근 7일 그래프</h3>
    <div id="chartWrap" class="chartWrap"></div>
  </div>
</div>

<div id="stats" class="page">
  <div class="card">
    <h3 class="section-title">기록 요약</h3>
    <div class="grid2">
      <div class="card center" style="margin:0">
        <div class="mini-title">오늘</div>
        <div id="statsToday" class="mini-value green">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">이번 주</div>
        <div id="weekTotal" class="mini-value orange">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">이번 달</div>
        <div id="statsMonth" class="mini-value purple">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">전체 누적</div>
        <div id="statsAllTotal" class="mini-value purple">0</div>
      </div>
    </div>
  </div>
</div>

<div id="settings" class="page">
  <div class="card settings-list">
    <div class="row">
      <div>자동 카운트</div>
      <button id="togAuto" class="toggle on"></button>
    </div>
    <div class="row">
      <div>숫자 음성</div>
      <button id="togSound" class="toggle on"></button>
    </div>
    <div class="row">
      <div>응원 문구 표시</div>
      <button id="togCheer" class="toggle on"></button>
    </div>
    <div class="row">
      <div>진동</div>
      <button id="togVibrate" class="toggle on"></button>
    </div>
    <div class="row" style="display:block">
      <div>목소리</div>
      <div class="voice-row">
        <button class="chip active" data-voice="female">여자</button>
        <button class="chip" data-voice="male">남자</button>
        <button class="chip" data-voice="baby">아기</button>
        <button class="chip" data-voice="mute">무음</button>
      </div>
    </div>
  </div>
</div>

<button id="floatBtn" class="floating" aria-label="스쿼트 버튼">
  <img src="icon.png" alt="용용이">
</button>

<div id="notice" class="notice"></div>

<script>
const KEY = 'yongyong_squat_fixed_v1';

function deepClone(obj){
  return JSON.parse(JSON.stringify(obj));
}

const defaultData = {
  records: {
    '2026-02-19': 100,
    '2026-02-20': 150,
    '2026-02-21': 100,
    '2026-02-22': 210,
    '2026-02-23': 100,
    '2026-02-24': 60,
    '2026-02-25': 500,
    '2026-02-26': 600,
    '2026-02-27': 1000,
    '2026-02-28': 400,
    '2026-03-01': 350,
    '2026-03-02': 350,
    '2026-03-03': 170,
    '2026-03-04': 160,
    '2026-03-05': 370,
    '2026-03-06': 330,
    '2026-03-07': 280,
    '2026-03-08': 200,
    '2026-03-09': 200,
    '2026-03-10': 200,
    '2026-03-11': 150,
    '2026-03-12': 40
  },
  todayGoal: 300,
  monthGoal: 10800,
  settings: {
    autoCount: true,
    sound: true,
    cheer: true,
    vibrate: true,
    voice: 'female'
  },
  floatHidden: false
};

const data = loadData();

let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let btnStartX = 0;
let btnStartY = 0;

let auto = {
  phase: 0,
  base: null,
  lowSeen: false,
  lowTime: 0,
  lastCount: 0
};

const tabs = document.querySelectorAll('.tab');
const pages = document.querySelectorAll('.page');
const mainBtn = document.getElementById('mainBtn');
const floatBtn = document.getElementById('floatBtn');
const notice = document.getElementById('notice');

tabs.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    pages.forEach(p=>p.classList.remove('active'));
    document.getElementById(btn.dataset.page).classList.add('active');
  });
});

document.getElementById('todayGoalInput').value = data.todayGoal;
document.getElementById('monthGoalInput').value = data.monthGoal;

document.getElementById('todayGoalInput').addEventListener('change', e=>{
  data.todayGoal = Math.max(1, parseInt(e.target.value || '300', 10));
  saveData();
  render();
});

document.getElementById('monthGoalInput').addEventListener('change', e=>{
  data.monthGoal = Math.max(1, parseInt(e.target.value || '10800', 10));
  saveData();
  render();
});

function ymd(d=new Date()){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function getCount(day){
  return data.records[day] || 0;
}

function setCount(day, count){
  data.records[day] = Math.max(0, count);
  if(data.records[day] === 0) delete data.records[day];
}

function addSquat(){
  const day = ymd();
  setCount(day, getCount(day) + 1);

  if(data.settings.vibrate && navigator.vibrate){
    navigator.vibrate(25);
  }

  const n = getCount(day);

  if(data.settings.sound && data.settings.voice !== 'mute'){
    speak(String(n));
  }

  if(data.settings.cheer && n > 0 && n % 20 === 0){
    showNotice('좋아요!');
  }

  saveData();
  render();
}

mainBtn.addEventListener('click', ()=>addSquat());
floatBtn.addEventListener('click', ()=>{ if(!isDragging) addSquat(); });

function loadData(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return deepClone(defaultData);

    const parsed = JSON.parse(raw);
    return {
      ...deepClone(defaultData),
      ...parsed,
      records: {
        ...defaultData.records,
        ...(parsed.records || {})
      },
      settings: {
        ...defaultData.settings,
        ...(parsed.settings || {})
      }
    };
  }catch(e){
    return deepClone(defaultData);
  }
}

function saveData(){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function monthDays(base=new Date()){
  const y = base.getFullYear();
  const m = base.getMonth();
  const last = new Date(y, m + 1, 0).getDate();
  const arr = [];
  for(let i=1;i<=last;i++) arr.push(new Date(y, m, i));
  return arr;
}

function monthTotal(date=new Date()){
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  let sum = 0;
  for(const k in data.records){
    if(k.startsWith(`${y}-${String(m).padStart(2,'0')}-`)){
      sum += data.records[k];
    }
  }
  return sum;
}

function yearTotal(date=new Date()){
  const y = `${date.getFullYear()}-`;
  let sum = 0;
  for(const k in data.records){
    if(k.startsWith(y)) sum += data.records[k];
  }
  return sum;
}

function allTotal(){
  return Object.values(data.records).reduce((a,b)=>a+b,0);
}

function dayMax(){
  let max = 0;
  for(const k in data.records){
    if(data.records[k] > max) max = data.records[k];
  }
  return max;
}

function calcStreaks(){
  const keys = Object.keys(data.records).filter(k=>data.records[k] > 0).sort();
  if(keys.length === 0) return {current:0, best:0};

  let best = 1;
  let cur = 1;

  for(let i=1;i<keys.length;i++){
    const prev = new Date(keys[i-1]);
    const curr = new Date(keys[i]);
    const diff = (curr - prev) / 86400000;
    if(diff === 1){
      cur++;
      best = Math.max(best, cur);
    }else{
      cur = 1;
    }
  }

  let current = 0;
  const today = new Date(ymd());
  for(let i=0;;i++){
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    if(getCount(ymd(d)) > 0){
      current++;
    }else{
      break;
    }
  }

  return {current, best};
}

function weekTotal(){
  const today = new Date();
  let sum = 0;
  for(let i=0;i<7;i++){
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    sum += getCount(ymd(d));
  }
  return sum;
}

function bubbleSize(count, max){
  if(count <= 0) return 0;
  const minSize = 24;
  const maxSize = 58;
  const ratio = Math.sqrt(count / Math.max(1, max));
  return Math.round(minSize + (maxSize - minSize) * ratio);
}

function renderCalendar(){
  const heads = document.getElementById('calendarHeads');
  const grid = document.getElementById('calendarGrid');

  heads.innerHTML = '';
  grid.innerHTML = '';

  ['일','월','화','수','목','금','토'].forEach(name=>{
    const h = document.createElement('div');
    h.className = 'cal-head';
    h.textContent = name;
    heads.appendChild(h);
  });

  const base = new Date();
  const y = base.getFullYear();
  const m = base.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const days = monthDays(base);
  const thisMonthCounts = days.map(d => getCount(ymd(d)));
  const maxCount = Math.max(1, ...thisMonthCounts);

  for(let i=0;i<firstDay;i++){
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
  }

  const todayKey = ymd();

  days.forEach(d=>{
    const dayKey = ymd(d);
    const count = getCount(dayKey);
    const el = document.createElement('div');
    el.className = 'day';

    const num = document.createElement('div');
    num.className = 'day-num' + (dayKey === todayKey ? ' today' : '');
    num.textContent = d.getDate();

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    if(count > 0){
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const size = bubbleSize(count, maxCount);
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      wrap.appendChild(bubble);
    }

    const cnt = document.createElement('div');
    cnt.className = 'day-count';
    cnt.textContent = count > 0 ? count + '개' : '';

    el.appendChild(num);
    el.appendChild(wrap);
    el.appendChild(cnt);
    grid.appendChild(el);
  });

  const streak = calcStreaks();
  document.getElementById('calCurrentStreak').textContent = streak.current + '일';
  document.getElementById('calBestStreak').textContent = streak.best + '일';
}

function renderChart(){
  const wrap = document.getElementById('chartWrap');
  wrap.innerHTML = '';
  const today = new Date();
  const arr = [];
  for(let i=6;i>=0;i--){
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    arr.push({label:`${d.getMonth()+1}/${d.getDate()}`, value:getCount(ymd(d))});
  }
  const max = Math.max(1, ...arr.map(x=>x.value));
  arr.forEach(item=>{
    const h = Math.max(6, Math.round((item.value / max) * 150));
    const div = document.createElement('div');
    div.className = 'barItem';
    div.innerHTML = `<div class="barVal">${item.value}</div><div class="barCol" style="height:${h}px"></div><div class="barLbl">${item.label}</div>`;
    wrap.appendChild(div);
  });
}

function setToggle(id, on){
  document.getElementById(id).classList.toggle('on', !!on);
}

function render(){
  const today = getCount(ymd());
  const mTotal = monthTotal();
  const yTotal = yearTotal();
  const total = allTotal();
  const streak = calcStreaks();

  const now = new Date();
  const dayOfMonth = now.getDate();
  const startOfYear = new Date(now.getFullYear(), 0, 1);
  const dayOfYear = Math.floor((now - startOfYear) / 86400000) + 1;

  let firstDate = null;
  Object.keys(data.records).forEach(d=>{
    if(!firstDate || d < firstDate) firstDate = d;
  });
  let totalDays = 1;
  if(firstDate){
    totalDays = Math.floor((now - new Date(firstDate)) / 86400000) + 1;
    if(totalDays < 1) totalDays = 1;
  }

  const monthAvg = Math.round(mTotal / dayOfMonth || 0);
  const yearAvg = Math.round(yTotal / dayOfYear || 0);
  const allAvg = Math.round(total / totalDays || 0);

  document.getElementById('todayGoalNow').textContent = today;
  document.getElementById('monthGoalNow').textContent = mTotal;
  document.getElementById('heroCount').textContent = today;

  document.getElementById('monthAvg').textContent = monthAvg.toLocaleString();
  document.getElementById('yearAvg').textContent = yearAvg.toLocaleString();
  document.getElementById('allAvg').textContent = allAvg.toLocaleString();
  document.getElementById('dayMax').textContent = dayMax().toLocaleString();
  document.getElementById('monthTotal').textContent = mTotal.toLocaleString();
  document.getElementById('allTotal').textContent = total.toLocaleString();

  document.getElementById('currentStreak').textContent = streak.current;
  document.getElementById('bestStreak').textContent = streak.best;

  document.getElementById('statsToday').textContent = today.toLocaleString();
  document.getElementById('weekTotal').textContent = weekTotal().toLocaleString();
  document.getElementById('statsMonth').textContent = mTotal.toLocaleString();
  document.getElementById('statsAllTotal').textContent = total.toLocaleString();

  const todayPct = Math.min(100, Math.round((today / Math.max(1, data.todayGoal)) * 100));
  const monthPct = Math.min(100, Math.round((mTotal / Math.max(1, data.monthGoal)) * 100));

  document.getElementById('todayBar').style.width = todayPct + '%';
  document.getElementById('monthBar').style.width = monthPct + '%';
  document.getElementById('monthPercent').textContent = monthPct + '%';

  floatBtn.classList.toggle('hidden', data.floatHidden);
  document.getElementById('hideFloatBtn').textContent = data.floatHidden ? '👆 버튼 보이기' : '👆 버튼 숨기기';

  setToggle('togAuto', data.settings.autoCount);
  setToggle('togSound', data.settings.sound);
  setToggle('togCheer', data.settings.cheer);
  setToggle('togVibrate', data.settings.vibrate);

  document.querySelectorAll('.chip').forEach(chip=>{
    chip.classList.toggle('active', chip.dataset.voice === data.settings.voice);
  });

  renderCalendar();
  renderChart();
}

document.getElementById('hideFloatBtn').addEventListener('click', ()=>{

  render();
});

document.getElementById('togSound').addEventListener('click', ()=>{

document.getElementById('togCheer').addEventListener('click', ()=>{

  render();

document.getElementById('togVibrate').addEventListener('click', ()=>{

document.querySelectorAll('.chip').forEach(chip=>{

window.addEventListener('devicemotion', function(e){
  if(!data.settings.autoCount) return;
  if(document.hidden) return;

  const acc = e.accelerationIncludingGravity;
  if(!acc) return;

  const x = acc.x || 0;
  const y = acc.y || 0;
  const z = acc.z || 0;
  const mag = Math.sqrt(x*x + y*y + z*z);
  const now = Date.now();

  if(auto.base === null){
    auto.base = mag;
    auto.phase = 0;
    auto.lowSeen = false;
    return;
  }

  auto.base = auto.base * 0.992 + mag * 0.008;
  const delta = mag - auto.base;

  // 내려갈 때는 절대 카운트 안 함
  if(auto.phase === 0){
    if(delta < -2.2){
      auto.phase = 1;
      auto.lowSeen = true;
      auto.lowTime = now;
    }
    return;
  }

  // 충분히 내려간 후, 다시 올라와서 끝났을 때만 1개
  if(auto.phase === 1){
    if(now - auto.lowTime > 2500){
      auto.phase = 0;
      auto.lowSeen = false;
      return;
    }

    if(
      auto.lowSeen &&
      delta > 1.8 &&
      now - auto.lowTime > 500 &&
      now - auto.lastCount > 1500
    ){
      auto.lastCount = now;
      auto.phase = 0;
      auto.lowSeen = false;
      addSquat();
    }
  }
});

document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){
    auto.base = null;
    auto.phase = 0;
    auto.lowSeen = false;
  }
});

function speak(text){
  if(!data.settings.sound) return;
  if(data.settings.voice === 'mute') return;

  try{
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'ko-KR';

    if(data.settings.voice === 'male'){
      msg.pitch = 0.8;
      msg.rate = 0.78;
    }else if(data.settings.voice === 'baby'){
      msg.pitch = 1.45;
      msg.rate = 0.86;
    }else{
      msg.pitch = 1.05;
      msg.rate = 0.80;
    }

    const voices = speechSynthesis.getVoices();
    const ko = voices.find(v => v.lang && v.lang.toLowerCase().includes('ko'));
    if(ko) msg.voice = ko;

    speechSynthesis.speak(msg);
  }catch(e){}
}

function showNotice(text){
  notice.textContent = text;
  notice.classList.add('show');
  clearTimeout(showNotice.t);
  showNotice.t = setTimeout(()=>notice.classList.remove('show'), 1500);
}

(function(){
  const btn = floatBtn;
  btn.style.right = '18px';
  btn.style.bottom = '28px';

  btn.addEventListener('touchstart', e=>{
    isDragging = false;
    const t = e.touches[0];
    dragStartX = t.clientX;
    dragStartY = t.clientY;
    const rect = btn.getBoundingClientRect();
    btnStartX = rect.left;
    btnStartY = rect.top;
  }, {passive:true});

  btn.addEventListener('touchmove', e=>{
    const t = e.touches[0];
    const dx = t.clientX - dragStartX;
    const dy = t.clientY - dragStartY;

    if(Math.abs(dx) > 8 || Math.abs(dy) > 8){
      isDragging = true;
    }

    if(isDragging){
      e.preventDefault();
      btn.style.left = Math.max(0, Math.min(window.innerWidth - 170, btnStartX + dx)) + 'px';
      btn.style.top = Math.max(0, Math.min(window.innerHeight - 170, btnStartY + dy)) + 'px';
      btn.style.right = 'auto';
      btn.style.bottom = 'auto';
    }
  }, {passive:false});

  btn.addEventListener('touchend', ()=>{
    setTimeout(()=>{ isDragging = false; }, 30);
  });
})();

render();
</script>
