<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용용이 스쿼트</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f4f4f4;
margin:0;
}

.top{
background:#fff;
padding:12px;
font-size:22px;
font-weight:bold;
}

.tabs{
display:flex;
justify-content:space-around;
background:#fff;
padding:12px 0;
border-bottom:1px solid #ddd;
}

.page{
display:block;
padding:20px;
}

#count{
font-size:90px;
margin-top:40px;
}

.mainBtn{
width:200px;
height:200px;
border-radius:50%;
border:none;
background:#ff6fa1;
color:white;
font-size:26px;
margin-top:40px;
}

.toast{
position:fixed;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#fff;
padding:10px 16px;
border-radius:20px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="top">
용용이 스쿼트
</div>

<div class="tabs">
<div>스쿼트</div>
<div>달력</div>
<div>그래프</div>
<div>통계</div>
<div>설정</div>
</div>

<div class="page">

<div id="count">0</div>

<button class="mainBtn" onclick="addSquat()">
스쿼트
</button>

</div>

<div id="toast" class="toast"></div>

<script>

let count=0
let last=0

function speak(n){
let msg=new SpeechSynthesisUtterance(n)
msg.lang="ko-KR"
speechSynthesis.speak(msg)
}

function showToast(t){

let toast=document.getElementById("toast")

toast.innerText=t
toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},1500)

}

function randomMent(){

let arr=[
"용용이 오빠 화이팅!",
"다리 힘 꽉!",
"오빠 쩔어!",
"오늘 폼 좋다!",
"끝까지 간다!",
"벌써 느낌 와?",
"오빠 코피 나겠어!"
]

return arr[Math.floor(Math.random()*arr.length)]

}

function addSquat(){

let now=Date.now()
if(now-last<300)return
last=now

count++

document.getElementById("count").innerText=count

navigator.vibrate(40)

speak(count)

if(count%20==0){
showToast(randomMent())
}

}

</script>

</body>
</html>
