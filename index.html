<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용용이 스쿼트</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f4f4f4;
margin:0;
}

.top{
background:#fff;
padding:10px;
font-size:20px;
font-weight:bold;
}

.tabs{
display:flex;
justify-content:space-around;
background:#fff;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.page{
display:none;
padding:20px;
}

.page.active{
display:block;
}

#count{
font-size:90px;
margin-top:40px;
color:#333;
}

.btn{
width:160px;
height:70px;
font-size:28px;
border:none;
border-radius:10px;
color:white;
margin:10px;
}

.add{
background:#28a745;
}

.reset{
background:#dc3545;
}

.mainBtn{
width:180px;
height:180px;
border-radius:50%;
background:#ff6fa1;
color:white;
font-size:28px;
border:none;
margin-top:40px;
}

</style>
</head>

<body>

<div class="top">
💪 용용이 스쿼트
</div>

<div class="tabs">
<div>💪 스쿼트</div>
<div>📅 달력</div>
<div>📊 그래프</div>
<div>🏆 통계</div>
<div>⚙️ 설정</div>
</div>

<div class="page active">

<div id="count">0</div>

<button class="btn add" onclick="add()">+1</button>
<button class="btn reset" onclick="reset()">리셋</button>

<br>

<button class="mainBtn" onclick="add()">
스쿼트
</button>

</div>

<script>

let count=0;

function speakNumber(n){
const msg=new SpeechSynthesisUtterance(n.toString());
msg.lang="ko-KR";
speechSynthesis.speak(msg);
}

function add(){

count++;

document.getElementById("count").innerText=count;

navigator.vibrate(40);

speakNumber(count);

if(count%20===0){
alert("🔥 "+count+"개 돌파!");
}

}

function reset(){

count=0;

document.getElementById("count").innerText=count;

}

</script>

</body>
</html>
