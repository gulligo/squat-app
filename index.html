<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" /> 
  
<title>용용이 스쿼트</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.png" type="image/png" />
<link rel="apple-touch-icon" href="icon.png" />
<style>
:root{
  --bg:#f7f1fb;
  --card:#ffffff;
  --line:#eadcf6;
  --primary:#8d4dff;
  --primary2:#c48bff;
  --text:#333;
  --orange:#ff8a2a;
  --green:#19c37d;
  --soft-pink:#f3d1da;
  --soft-pink-2:#efc4d0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x: hidden;
}
.top-tabs{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  background:#fff;
  border-bottom: none;
}
.top-tabs button{
  flex:1;
  border:none;
  background:none;
  padding:10px 15px;
  font-size:15px;
  font-weight:800;
  color:#666;
}
.top-tabs button.active{
  color:var(--primary);
}
.page{display:none;padding:4px 8px 220px}
.page.active{display:block}
.calendar-page .calendar-header button {
    font-size: 35px !important;
    font-weight: bold;
    padding: 10px 25px !important;
    color: #8d4dff !important;
    border: none;
    background: none;
}
.card{
  background:var(--card);
  border-radius:16px;
  padding:4px 8px;
  margin-bottom:2px;
}
.goal-head{font-size:12px;color:#999;margin-bottom:2px}
.goal-line{display:flex;align-items:center;gap:8px;margin-bottom:1px}
.goal-num{font-size:16px;font-weight:900}
.goal-input{
  width:82px;height:32px;border-radius:12px;border:2px solid var(--line);
  text-align:center;font-size:15px;font-weight:800;color:#444;background:#faf7ff;
}
.bar{height:6px;background:transparent;overflow:hidden}
.bar>div{
  height:100%;width:0%;border-radius:999px;
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  transition:width .2s;
}
.monthbar>div{background:linear-gradient(90deg,#22c55e,#4ade80)}
.hero{text-align:center;padding:6px 8px;margin-top:4px}
.hero-count{font-size:120px;line-height:1;color:var(--primary);font-weight:900}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.mini-title{font-size:11px;color:#9f90ab;margin-bottom:5px}
.mini-value{font-size:24px;font-weight:900;line-height:1.1}
.center{text-align:center}
.card.center{min-height:70px;display:flex;flex-direction:column;justify-content:center}
.orange{color:var(--orange)}
.green{color:var(--green)}
.purple{color:var(--primary)}
.small{font-size:11px;color:#b7aabc}
.streak{display:grid;grid-template-columns:1fr 1px 1fr;gap:8px;align-items:center}
.divider{width:1px;background:#eee}
.main-btn-row{display:flex;justify-content:center;gap:10px;margin-top:2px}
.main-btn{
  border:none;background:linear-gradient(90deg,var(--primary),var(--primary2));
  color:#fff;font-size:21px;font-weight:900;padding:14px 26px;border-radius:999px;
  box-shadow:0 8px 20px rgba(141,77,255,.22);
}
.main-btn.plus10{background:linear-gradient(90deg,#6f63ff,#b77dff)}
.settings-list .row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:none;
}
.settings-list .row:last-child{border-bottom:none}
.toggle{
  width:54px;height:32px;border-radius:999px;background:#ddd;position:relative;border:none;
}
.toggle::after{
  content:"";position:absolute;top:4px;left:4px;width:24px;height:24px;border-radius:50%;
  background:#fff;transition:.2s;
}
.toggle.on{background:var(--primary)}
.toggle.on::after{left:26px}
.voice-row,.graph-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.chip{
  border:none;padding:8px 11px;border-radius:999px;background:#f1ebf8;color:#666;font-weight:800;
}
.chip.active{background:var(--primary);color:#fff}
.section-title{font-size:16px;font-weight:900;margin:0 0 8px}
.cal-heads,.calendar-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:12px 4px;
}
.cal-head{text-align:center;font-size:11px;color:#7b6888;font-weight:800}
.day{
  min-height:40px;border-radius:10px;background:#fcfbfe;padding:3px 1px 4px;text-align:center;
}
.day.empty{background:transparent}
.day-bubble-wrap{
  height:33px;display:flex;align-items:center;justify-content:center;
}
.day-bubble{
  border-radius:50%;
  background:linear-gradient(180deg,var(--soft-pink),var(--soft-pink-2));
  display:flex;align-items:center;justify-content:center;
  color:#5f4d69;font-weight:900;font-size:13px;
}
.day-count{
  margin-top:3px;font-size:10px;font-weight:900;color:#9a7faa;min-height:12px;
}
.chartWrap {
  display: flex;
  align-items: flex-end;
  gap: 1px;
  height: 500px;
  overflow-x: auto;
  overflow-y: hidden;
  min-width: 0;
  padding-top: 20px;
  background-image: linear-gradient(#eee 1px, transparent 1px);
  background-size: 100% 55px;
}
.barItem { flex: 1; text-align: center; padding: 0 1px; }
.barVal { font-size: 8px; color: #555; margin-bottom: 2px; }
.barCol { width: 100%; background: #7c4dff; border-radius: 2px 2px 0 0; min-height: 1px; }
.barLbl { font-size: 8px; color: #555; margin-top: 3px; }
.floating{
  position:fixed;right:12px;bottom:16px;z-index:99;
  width:150px;height:150px;border-radius:50%;border:none;background:#fff;
  box-shadow:0 8px 24px rgba(0,0,0,.18);overflow:hidden;
}
.floating img{width:100%;height:100%;object-fit:cover}
.notice{
  position:fixed;left:50%;bottom:165px;transform:translateX(-50%);
  background:rgba(34,34,34,.92);color:#fff;padding:10px 14px;border-radius:999px;
  font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:100;
  max-width:88vw;white-space:nowrap;
}
.notice.show{opacity:1}
  .confetti-container{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:999;overflow:hidden;
}
.confetti{
  position:absolute;top:-10px;
  width:10px;height:14px;
  opacity:0;
  animation:confetti-fall 2.5s ease-in forwards;
}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
</style>
</head>
<body>
  <div class="top-tabs">
  <button class="tab active" data-page="home">스쿼트</button>

<div id="home" class="page active">

    <div class="card center">

  <div class="main-btn-row" style="flex-direction: column; align-items: center;">
  <button id="plus10Btn" class="main-btn plus10">+10</button>

    ⏸️ 정지
  </button>
</div>
</div>
<div id="calendar" class="page">
  <div class="card">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
  <button onclick="changeMonth(-1)" style="padding:0 15px;background:none;border:1px solid #ddd;border-radius:5px;"> < </button>

</div>
    <div id="calendarHeads" class="cal-heads" style="margin-bottom:6px"></div>
    <div id="calendarGrid" class="calendar-grid"></div>
  </div>
</div>

<div id="graph" class="page">
  <div class="card">
    <div class="section-title">그래프</div>
    <div class="graph-tabs">
  <button class="chip active graph-chip" data-graph="day">일</button>
  <button class="chip graph-chip" data-graph="month">월</button>
  <button class="chip graph-chip" data-graph="year">년</button>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0 10px 0;">
  <button onclick="changeGraphMonth(-1)" 
    style="width:60px;height:60px;border-radius:12px;border:1px solid #ddd;background:#fff;font-size:28px;">
    <
  </button>

  <span style="font-size:12px;color:#999;">합계 <span id="graphSum" style="color:#19c37d;">-</span></span>
  <button onclick="changeGraphMonth(1)" 
    style="width:60px;height:60px;border-radius:12px;border:1px solid #ddd;background:#fff;font-size:28px;">
    >
  </button>
</div>
</div>
<div class="graph-container" style="display:flex;position:relative;margin-bottom:20px;overflow:hidden;height:500px;">
  <div class="y-axis" style="display:flex;flex-direction:column;justify-content:space-between;height:480px;">
  <div id="yTop">1000</div>
<div id="yMid">500</div>
<div id="yBottom">0</div>
</div>
      <div id="chartWrap" class="chartWrap" style="flex:1;"></div>
    </div>
</div>
<div id="stats" class="page">
  <div class="card">
    <div class="section-title">기록 요약</div>
    <div class="row2">
      <div class="card center" style="margin:0">
        <div class="mini-title">오늘</div>
        <div id="statsToday" class="mini-value green">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">이번 주</div>
        <div id="weekTotal" class="mini-value orange">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">이번 월</div>
        <div id="statsMonth" class="mini-value purple">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">전체 누적</div>
        <div id="statsAllTotal" class="mini-value purple">0</div>
      </div>
    </div>
  </div>
</div>

<div id="settings" class="page">
  <div class="card settings-list">
    <div class="row"><div>자동 카운트</div><button id="togAuto" class="toggle on"></button></div>

      </div>
      </div>
    <div class="row">
      <button onclick="backupData()" style="border:none;background:#f1ebf8;color:#8d4dff;font-weight:800;padding:10px 20px;border-radius:999px;font-size:14px;">기록 백업</button>
      <button onclick="restoreData()" style="border:none;background:#f1ebf8;color:#8d4dff;font-weight:800;padding:10px 20px;border-radius:999px;font-size:14px;">기록 복구</button>
    </div>
  </div>
</div>

<br><br>
<input type="file" id="restoreFile" style="display:none">
<button id="floatBtn" class="floating" aria-label="이동 버튼">
  <img src="icon.png" alt="용용이" />
</button>
<div id="notice" class="notice"></div>
<script>
const KEY = 'yongyong_squat_final_v5';
const EVENT_STEP = 20;

function clone(v){ return JSON.parse(JSON.stringify(v)); }

const defaultData = {

    '2026-03-16':750,'2026-03-17':432,'2026-03-18':365,'2026-03-19':395,'2026-03-20':465,'2026-03-21':538,'2026-03-22':463,'2026-03-23':420,'2026-03-24':365,'2026-03-25':403,'2026-03-26':365,'2026-03-27':428,'2026-03-28':321,'2026-03-29':473,'2026-03-30':535,'2026-03-31':485,
    '2026-04-01':650,'2026-04-02':680,'2026-04-03':580,'2026-04-04':300
  },
  todayGoal:300,
  monthGoal:10800,
  settings:{
    autoCount:true,
    sound:true,
    cheer:true,
    vibrate:true,
    voice:'female'
  },
  graphMode:'day'
};

const FEMALE_LINES = [
"자기야 오늘밤 기대할께","오빠 더우면 다벗어","오빠 벌떡 벌떡 일어나","다리를 벌떡 일으켜 세우란 말이야",
"역시 내 남자는 멋져","오빠 난 허물 허물 한 다리는 싫어","어머 아직도 일어날 힘이 남았어?","내 눈앞에서 그렇게 힘을주면 난 설레어",
"어머 욕심난다 저 다리","좀 더 깊숙히 내려","날 가지러면 힘을 더 키워","난 딱딱한 오빠 다리가 너무좋아",

"오늘 밤 끝까지 버티면 내가 해줄 게 많아.","더 세게힘줘 멈추지 말고 끝까지 책임져.","호흡이 점점 거칠어지네, 나도 그래.","한 번 더, 이번엔 아주 천천히 느껴봐.",

const MALE_LINES = [
  "좋아 계속 간다!","자세 유지!","호흡 맞춰!","힘 더 써!","아직 멀었다!",
  "리듬 좋다!","좋아 그대로!","힘 남았다!","지금 좋다!","계속 간다!",
  "그렇게 할 거냐!","자세 다시!","허리 펴!","집중 안 하냐!","제대로 해!",
  "지금이 고비다!","끝까지 밀어!","멈추지 마!","버텨라!","마지막까지 간다!"
];

const BABY_LINES = [
  "좋아요!","짱이에요!","잘했어요!","멋져요!","대단해요!","최고예요!","계속해요!","잘하고 있어요!"
];

const data = loadData();
let isPaused = false;

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById('pauseBtn');
  if (isPaused) {
    btn.innerHTML = '▶️ 시작';
    btn.style.background = 'var(--orange)';
  } else {
    btn.innerHTML = '⏸️ 정지';
    btn.style.background = 'var(--green)';
  }
}
let currentPage = 'home';
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let btnStartX = 0;
let btnStartY = 0;

let auto = {
  base:null,
  stage:'idle',
  downTime:0,
  upTime:0,
  lastCountTime:0,
  lowDelta:0,
  highDelta:0
};

const tabs = document.querySelectorAll('.tab');
const pages = document.querySelectorAll('.page');
const plus10Btn = document.getElementById('plus10Btn');
const floatBtn = document.getElementById('floatBtn');
const notice = document.getElementById('notice');

tabs.forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentPage = btn.dataset.page;
    tabs.forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    pages.forEach(p=>p.classList.remove('active'));
    document.getElementById(currentPage).classList.add('active');
    updateFloatingVisibility();
  });
});

document.querySelectorAll('.graph-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    data.graphMode = chip.dataset.graph;
    saveData();
    render();
    renderChart();
  });
});

document.querySelectorAll('.voice-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    data.settings.voice = chip.dataset.voice;
    saveData();
    render();
  });
});

document.getElementById('todayGoalInput').value = data.todayGoal;
document.getElementById('monthGoalInput').value = data.monthGoal;

document.getElementById('todayGoalInput').addEventListener('change',e=>{
  data.todayGoal = Math.max(1, parseInt(e.target.value || '300',10));
  saveData();
  render();
});

document.getElementById('monthGoalInput').addEventListener('change',e=>{
  data.monthGoal = Math.max(1, parseInt(e.target.value || '10800',10));
  saveData();
  render();
});

document.getElementById('togAuto').addEventListener('click',()=>{
  data.settings.autoCount = !data.settings.autoCount;
  saveData();
  render();
});

document.getElementById('togSound').addEventListener('click',()=>{
  data.settings.sound = !data.settings.sound;
  saveData();
  render();
});

document.getElementById('togCheer').addEventListener('click',()=>{
  data.settings.cheer = !data.settings.cheer;
  saveData();

function ymd(d=new Date()){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function getCount(day){ return data.records[day] || 0; }

function setCount(day,count){
  data.records[day] = Math.max(0,count);
  if(data.records[day]===0) delete data.records[day];
}

function loadData(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return clone(defaultData);
    const parsed = JSON.parse(raw);
    return {
      ...clone(defaultData),
      ...parsed,
      records:{...defaultData.records,...(parsed.records||{})},
      settings:{...defaultData.settings,...(parsed.settings||{})}
    };
  }catch(e){
    return clone(defaultData);
  }
}

function saveData(){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function randomFrom(arr){
  if(!arr || arr.length===0) return '';
  return arr[Math.floor(Math.random()*arr.length)];
}

function getEventLine(){
  if(data.settings.voice==='male') return randomFrom(MALE_LINES);
  if(data.settings.voice==='baby') return randomFrom(BABY_LINES);
  return randomFrom(FEMALE_LINES);
}

function speak(text){
  if(data.settings.voice==='mute') return;
  try{
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'ko-KR';
    if(data.settings.voice==='male'){
      msg.pitch = 0.82;
      msg.rate = 0.78;
    }else if(data.settings.voice==='baby'){
      msg.pitch = 1.7;
      msg.rate = 0.98;
    }else{
      msg.pitch = 1.05;
      msg.rate = 0.80;
    }
    const voices = speechSynthesis.getVoices();
    const ko = voices.find(v=>v.lang && v.lang.toLowerCase().includes('ko'));
    if(ko) msg.voice = ko;
    speechSynthesis.speak(msg);
  }catch(e){}
}

function showNotice(text){

function addSquat(amount=1){
  if (isPaused) return;
  const day = ymd();
  const before = getCount(day);
  setCount(day, before + amount);
  if(data.settings.vibrate && navigator.vibrate){
    navigator.vibrate(amount===10 ? [25,40,25] : 25);
  }
  const after = getCount(day);
  if(data.settings.sound && data.settings.voice!=='mute'){
    if(after % EVENT_STEP !== 0){
      speak(String(after));
    }
  }
  if(data.settings.cheer){
    const beforeStep = Math.floor(before / EVENT_STEP);
    const afterStep = Math.floor(after / EVENT_STEP);
    if(afterStep > beforeStep){
      const line = getEventLine();
      if(line){
        showNotice(line);
        if(data.settings.cheer && data.settings.voice!=='mute') speak(line);
      }
    }
  }
  const prevPct = Math.floor(before / data.todayGoal * 100);
  const newPct = Math.floor(after / data.todayGoal * 100);
  if(prevPct < 100 && newPct >= 100) launchConfetti();
  saveData();
  render();
}

function monthDays(base=new Date()){
  const y = base.getFullYear();
  const m = base.getMonth();
  const last = new Date(y,m+1,0).getDate();
  const arr = [];
  for(let i=1;i<=last;i++) arr.push(new Date(y,m,i));
  return arr;
}

function monthTotal(date=new Date()){
  const y = date.getFullYear();
  const m = date.getMonth()+1;
  let sum = 0;
  for(const k in data.records){
    if(k.startsWith(`${y}-${String(m).padStart(2,'0')}-`)) sum += data.records[k];
  }
  return sum;
}

function yearTotal(date=new Date()){
  const y = `${date.getFullYear()}-`;
  let sum = 0;
  for(const k in data.records){
    if(k.startsWith(y)) sum += data.records[k];
  }
  return sum;
}

function allTotal(){
  return Object.values(data.records).reduce((a,b)=>a+b,0);
}

function dayMax(){
  let max = 0;
  for(const k in data.records){
    if(data.records[k] > max) max = data.records[k];
  }
  return max;
}

function calcStreaks(){
  const keys = Object.keys(data.records).filter(k=>data.records[k]>0).sort();
  if(keys.length===0) return {current:0,best:0};
  let best = 1;
  let cur = 1;
  for(let i=1;i<keys.length;i++){
    const prev = new Date(keys[i-1]);
    const curr = new Date(keys[i]);
    const diff = (curr-prev)/86400000;
    if(diff===1){
      cur++;
      best=Math.max(best,cur);
    }else{
      cur=1;
    }
  }
  let current = 0;
  const today = new Date(ymd());
  for(let i=0;;i++){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    if(getCount(ymd(d))>0) current++;
    else break;
  }
  return {current,best};
}

function weekTotal(){
  const today = new Date();
  let sum = 0;
  for(let i=0;i<7;i++){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    sum += getCount(ymd(d));
  }
  return sum;
}

function bubbleSize(count,max){
  if(count<=0) return 0;
  const minSize = 14;
  const maxSize = 46;
  const ratio = count / 1000;
  return Math.round(minSize + (maxSize-minSize)*ratio);
}

function getYearlySeries(){

  for(let i=2;i>=0;i--){
    const y = today.getFullYear()-i;
    let sum = 0;
    for(const k in data.records){
      if(k.startsWith(String(y))) sum += data.records[k];
    }
    arr.push({label:`${y}`, value:sum});
  }
  return arr;
}

function getDailySeries(){

    const val = (data.records && data.records[k]) || 0;

 window.addEventListener('devicemotion', function(e){
  if(!data.settings.autoCount) return;
  if(isPaused) return;
  if(document.hidden) return;
  if(currentPage!=='home') return;
  const acc = e.accelerationIncludingGravity;
  if(!acc) return;
  const x = acc.x || 0;
  const y = acc.y || 0;
  const z = acc.z || 0;
  const mag = Math.sqrt(x*x + y*y + z*z);
  const now = Date.now();
  if(auto.base===null){
    auto.base = mag;
    auto.stage = 'idle';
    auto.lowDelta = 0;
    auto.highDelta = 0;
    return;
  }
  auto.base = auto.base * 0.993 + mag * 0.007;
  const delta = mag - auto.base;
  if(auto.stage==='idle'){
    if(delta < -1.5){ auto.stage = 'down'; auto.downTime = now; auto.lowDelta = delta; }
    return;
  }
  if(auto.stage==='down'){
    if(delta < auto.lowDelta) auto.lowDelta = delta;
    if(now - auto.downTime > 3500){ auto.stage = 'idle'; return; }
    if(delta > 1.2 && now - auto.downTime > 250){ auto.stage = 'up'; auto.upTime = now; auto.highDelta = delta; }
    return;
  }
  if(auto.stage==='up'){
    if(delta > auto.highDelta) auto.highDelta = delta;
    if(now - auto.upTime > 2500){ auto.stage = 'idle'; return; }
    if(delta > -0.3 && delta < 1.0 && now - auto.upTime > 150 && now - auto.lastCountTime > 2000){
      auto.lastCountTime = now;
      auto.stage = 'idle';
      addSquat(1);
    }
  }
});

  if(document.hidden){ auto.base = null; auto.stage = 'idle'; }

      btn.style.right = 'auto';
      btn.style.bottom = 'auto';

  },{passive:false});
