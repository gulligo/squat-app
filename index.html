<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>용용이 스쿼트</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.png" type="image/png" />
<link rel="apple-touch-icon" href="icon.png" />
<style>
:root{
  --bg:#f7f1fb;
  --card:#ffffff;
  --line:#eadcf6;
  --primary:#8d4dff;
  --primary2:#c48bff;
  --text:#333;
  --orange:#ff8a2a;
  --green:#19c37d;
  --soft-pink:#f3d1da;
  --soft-pink-2:#efc4d0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.top-tabs{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  background:#fff;
  border-bottom:?none;
}
.top-tabs button{
  flex:1;
  border:none;
  background:none;
  padding:20px 3px;
  font-size:15px;
  font-weight:800;
  color:#666;
}
.top-tabs button.active{
  color:var(--primary);
}
.page{display:none;padding:4px 8px 220px}
.page.active{display:block}
.card{
  background:var(--card);
  border-radius:16px;
  padding:4px;
  margin-bottom:4px;
}
.goal-head{font-size:12px;color:#999;margin-bottom:5px}
.goal-line{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.goal-num{font-size:16px;font-weight:900}
.goal-input{
  width:82px;height:32px;border-radius:12px;border:2px solid var(--line);
  text-align:center;font-size:15px;font-weight:800;color:#444;background:#faf7ff;
}
.bar{height:10px;background:transparent;overflow:hidden}
.bar>div{
  height:100%;width:0%;border-radius:999px;
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  transition:width .2s;
}
.monthbar>div{background:linear-gradient(90deg,#22c55e,#4ade80)}
.hero{text-align:center;padding:30px 8px;margin-top:10px}
.hero-count{font-size:120px;line-height:1;color:var(--primary);font-weight:900}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.mini-title{font-size:11px;color:#9f90ab;margin-bottom:5px}
.mini-value{font-size:24px;font-weight:900;line-height:1.1}
.center{text-align:center}
.card.center{min-height:80px;display:flex;flex-direction:column;justify-content:center}
.orange{color:var(--orange)}
.green{color:var(--green)}
.purple{color:var(--primary)}
.small{font-size:11px;color:#b7aabc}
.streak{display:grid;grid-template-columns:1fr 1px 1fr;gap:8px;align-items:center}
.divider{width:1px;background:#eee}
.main-btn-row{display:flex;justify-content:center;gap:10px;margin-top:2px}
.main-btn{
  border:none;background:linear-gradient(90deg,var(--primary),var(--primary2));
  color:#fff;font-size:21px;font-weight:900;padding:14px 26px;border-radius:999px;
  box-shadow:0 8px 20px rgba(141,77,255,.22);
}
.main-btn.plus10{background:linear-gradient(90deg,#6f63ff,#b77dff)}
.settings-list .row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:none;
}
.settings-list .row:last-child{border-bottom:none}
.toggle{
  width:54px;height:32px;border-radius:999px;background:#ddd;position:relative;border:none;
}
.toggle::after{
  content:"";position:absolute;top:4px;left:4px;width:24px;height:24px;border-radius:50%;
  background:#fff;transition:.2s;
}
.toggle.on{background:var(--primary)}
.toggle.on::after{left:26px}
.voice-row,.graph-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.chip{
  border:none;padding:8px 11px;border-radius:999px;background:#f1ebf8;color:#666;font-weight:800;
}
.chip.active{background:var(--primary);color:#fff}
.section-title{font-size:16px;font-weight:900;margin:0 0 8px}
.cal-heads,.calendar-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:5px 4px;
}
.cal-head{text-align:center;font-size:11px;color:#7b6888;font-weight:800}
.day{
  min-height:40px;border-radius:10px;background:#fcfbfe;padding:3px 1px 4px;text-align:center;
}
.day.empty{background:transparent}
.day-bubble-wrap{
  height:33px;display:flex;align-items:center;justify-content:center;
}
.day-bubble{
  border-radius:50%;
  background:linear-gradient(180deg,var(--soft-pink),var(--soft-pink-2));
  display:flex;align-items:center;justify-content:center;
  color:#5f4d69;font-weight:900;font-size:13px;
}
.day-count{
  margin-top:3px;font-size:10px;font-weight:900;color:#9a7faa;min-height:12px;
}
.chartWrap{
  display:flex;align-items:flex-end;gap:7px;height:130px;overflow-x:auto;padding-top:4px;
}
.barItem{min-width:34px;text-align:center}
.barVal{font-size:9px;color:#999;margin-bottom:3px}
.barCol{
  width:100%;background:linear-gradient(180deg,var(--primary2),var(--primary));
  border-radius:8px 8px 4px 4px;min-height:8px;
}
.barLbl{font-size:9px;color:#888;margin-top:4px}
.floating{
  position:fixed;right:12px;bottom:16px;z-index:99;
  width:150px;height:150px;border-radius:50%;border:none;background:#fff;
  box-shadow:0 8px 24px rgba(0,0,0,.18);overflow:hidden;
}
.floating img{width:100%;height:100%;object-fit:cover}
.notice{
  position:fixed;left:50%;bottom:165px;transform:translateX(-50%);
  background:rgba(34,34,34,.92);color:#fff;padding:10px 14px;border-radius:999px;
  font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:100;
  max-width:88vw;white-space:nowrap;
}
.notice.show{opacity:1}
</style>
</head>
<body>

<div class="top-tabs">
  <button class="tab active" data-page="home">스쿼트</button>
  <button class="tab" data-page="calendar">달력</button>
  <button class="tab" data-page="graph">그래프</button>
  <button class="tab" data-page="settings">설정</button>
</div>

<div id="home" class="page active">
  <div class="card">
    <div class="goal-head">오늘 목표</div>
    <div class="goal-line">
      <div id="todayGoalNow" class="goal-num">0</div>
      <span>/</span>
      <input id="todayGoalInput" class="goal-input" type="number" min="1" value="300" />
      <div id="todayPercent" class="goal-num orange" style="margin-left:auto;font-size:15px">0%</div>
    </div>
    <div class="bar"><div id="todayBar"></div></div>
  </div>

  <div class="card">
    <div class="goal-head">월 목표</div>
    <div class="goal-line">
      <div id="monthGoalNow" class="goal-num">0</div>
      <span>/</span>
      <input id="monthGoalInput" class="goal-input" type="number" min="1" value="10800" />
      <div id="monthPercent" class="goal-num orange" style="margin-left:auto;font-size:15px">0%</div>
    </div>
    <div class="bar monthbar"><div id="monthBar"></div></div>
  </div>

  <div class="card hero">
    <div id="heroCount" class="hero-count">0</div>
    <div class="hero-unit"></div>
  </div>

  <div class="row2">
    <div class="card center">
      <div class="mini-title">한달 평균</div>
      <div id="monthAvg" class="mini-value purple">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">연 평균</div>
      <div id="yearAvg" class="mini-value purple">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">총 평균</div>
      <div id="allAvg" class="mini-value purple">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">일 최대</div>
      <div id="dayMax" class="mini-value orange">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">이번 달</div>
      <div id="monthTotal" class="mini-value green">0</div>
    </div>
    <div class="card center">
      <div class="mini-title">전체 누적</div>
      <div id="allTotal" class="mini-value green">0</div>
    </div>
  </div>

  <div class="row2">
  <div class="card center">
    <div class="mini-title">현재 연속</div>
    <div id="currentStreak" class="mini-value orange">0</div>
    <div class="small">일</div>
  </div>

  <div class="card center">
    <div class="mini-title">최고 연속</div>
    <div id="bestStreak" class="mini-value orange">0</div>
    <div class="small">일</div>
  </div>
</div>

  <div class="main-btn-row">
    <button id="plus10Btn" class="main-btn plus10">+10</button>
  </div>
</div>

<div id="calendar" class="page">
  <div class="card">
    <div class="section-title">이번 달 기록</div>
    <div class="cal-heads" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <div id="calendarGrid" class="calendar-grid"></div>
  </div>
</div>

<div id="graph" class="page">
  <div class="card">
    <div class="section-title">그래프</div>
    <div class="graph-tabs">
      <button class="chip active graph-chip" data-graph="day">일</button>
      <button class="chip graph-chip" data-graph="month">달</button>
      <button class="chip graph-chip" data-graph="year">년</button>
    </div>
    <div id="chartWrap" class="chartWrap"></div>
  </div>
</div>

<div id="stats" class="page">
  <div class="card">
    <div class="section-title">기록 요약</div>
    <div class="row2">
      <div class="card center" style="margin:0">
        <div class="mini-title">오늘</div>
        <div id="statsToday" class="mini-value green">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">이번 주</div>
        <div id="weekTotal" class="mini-value orange">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">이번 달</div>
        <div id="statsMonth" class="mini-value purple">0</div>
      </div>
      <div class="card center" style="margin:0">
        <div class="mini-title">전체 누적</div>
        <div id="statsAllTotal" class="mini-value purple">0</div>
      </div>
    </div>
  </div>
</div>

<div id="settings" class="page">
  <div class="card settings-list">
    <div class="row"><div>자동 카운트</div><button id="togAuto" class="toggle on"></button></div>
    <div class="row"><div>숫자 음성</div><button id="togSound" class="toggle on"></button></div>
    <div class="row"><div>이벤트 멘트</div><button id="togCheer" class="toggle on"></button></div>
    <div class="row"><div>진동</div><button id="togVibrate" class="toggle on"></button></div>
    <div class="row" style="display:block">
      <div>목소리</div>
      <div class="voice-row">
        <button class="chip active voice-chip" data-voice="female">여자</button>
        <button class="chip voice-chip" data-voice="male">남자</button>
        <button class="chip voice-chip" data-voice="baby">아기</button>
        <button class="chip voice-chip" data-voice="mute">무음</button>
      </div>
    </div>
  </div>
</div>
  </div>
</div>
</div>
</div>
</div>

<br><br>
<button onclick="backupData()">기록 백업</button>
<button onclick="restoreData()">기록 복구</button>
<input type="file" id="restoreFile" style="display:none">
<button id="floatBtn" class="floating" aria-label="이동 버튼">
  <img src="icon.png" alt="용용이" />
</button>

<div id="notice" class="notice"></div>

<script>
const KEY = 'yongyong_squat_final_v5';
const EVENT_STEP = 20;

function clone(v){ return JSON.parse(JSON.stringify(v)); }

const defaultData = {
  records: {
    '2026-02-19':100,'2026-02-20':150,'2026-02-21':100,'2026-02-22':210,'2026-02-23':100,'2026-02-24':60,
    '2026-02-25':500,'2026-02-26':600,'2026-02-27':1000,'2026-02-28':400,
    '2026-03-01':350,'2026-03-02':350,'2026-03-03':170,'2026-03-04':160,'2026-03-05':370,'2026-03-06':330,
    '2026-03-07':280,'2026-03-08':200,'2026-03-09':200,'2026-03-10':200,'2026-03-11':150,'2026-03-12':40,
    '2026-03-13':340,'2026-03-14':370,'2026-03-15':370
  },
  todayGoal:300,
  monthGoal:10800,
  settings:{
    autoCount:true,
    sound:true,
    cheer:true,
    vibrate:true,
    voice:'female'
  },
  graphMode:'day'
};

// 여자 멘트는 여기 직접 추가
const FEMALE_LINES = [
"오늘밤 기대할께","오빠 더우면 다벗어","오빠 벌떡 벌떡 일어나","다리를 일으켜 세우란 말이야 도와줘?",
"역시 내 남자는 멋져","오빠 난 허물 허물 한 다리는 싫어","어머 아직도 일어날 힘이 남았어?","내 눈앞에서 그렇게 힘을주면 난 설레어",
"어머 욕심난다 저 다리","더 깊숙히 내려","날 가지러면 힘을 더 키워","난 딱딱한 오빠 다리가 너무좋아",
"어머! 다리가 너무 딱딱해","자기야 오늘 너무 무리하는거 아니야","날 앉고 다리에 힘을 넣어봐","오빠 다리 힘 빠지면 내가 더 슬퍼",
  "오늘 밤 끝까지 버티면 내가 해줄 게 많아.","더 세게힘줘 멈추지 말고 끝까지 책임져.","호흡이 점점 거칠어지네, 나도 그래.","한 번 더, 이번엔 아주 천천히 느껴봐.",
  "지금 오빠 모습, 정말 유혹적이다","오늘 밤 내가 지켜볼 테니까 다리 똑바로 해.",
"먼저 씻고 있을께"
];

const MALE_LINES = [
  "좋아 계속 간다!","자세 유지!","호흡 맞춰!","힘 더 써!","아직 멀었다!",
  "리듬 좋다!","좋아 그대로!","힘 남았다!","지금 좋다!","계속 간다!",
  "그렇게 할 거냐!","자세 다시!","허리 펴!","집중 안 하냐!","제대로 해!",
  "지금이 고비다!","끝까지 밀어!","멈추지 마!","버텨라!","마지막까지 간다!"
];

const BABY_LINES = [
  "좋아요!","짱이에요!","잘했어요!","멋져요!","대단해요!","최고예요!","계속해요!","잘하고 있어요!"
];

const data = loadData();

let currentPage = 'home';
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let btnStartX = 0;
let btnStartY = 0;

// 자동카운트: 내려감 -> 올라옴 -> 안정됨 후 +1
let auto = {
  base:null,
  stage:'idle',
  downTime:0,
  upTime:0,
  lastCountTime:0,
  lowDelta:0,
  highDelta:0
};

const tabs = document.querySelectorAll('.tab');
const pages = document.querySelectorAll('.page');
const mainBtn = document.getElementById('mainBtn');
const plus10Btn = document.getElementById('plus10Btn');
const floatBtn = document.getElementById('floatBtn');
const notice = document.getElementById('notice');

tabs.forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentPage = btn.dataset.page;
    tabs.forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    pages.forEach(p=>p.classList.remove('active'));
    document.getElementById(currentPage).classList.add('active');
    updateFloatingVisibility();
  });
});

document.querySelectorAll('.graph-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    data.graphMode = chip.dataset.graph;
    saveData();
    render();
  });
});

document.querySelectorAll('.voice-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    data.settings.voice = chip.dataset.voice;
    saveData();
    render();
  });
});

document.getElementById('todayGoalInput').value = data.todayGoal;
document.getElementById('monthGoalInput').value = data.monthGoal;

document.getElementById('todayGoalInput').addEventListener('change',e=>{
  data.todayGoal = Math.max(1, parseInt(e.target.value || '300',10));
  saveData();
  render();
});

document.getElementById('monthGoalInput').addEventListener('change',e=>{
  data.monthGoal = Math.max(1, parseInt(e.target.value || '10800',10));
  saveData();
  render();
});

document.getElementById('togAuto').addEventListener('click',()=>{
  data.settings.autoCount = !data.settings.autoCount;
  saveData();
  render();
});

document.getElementById('togSound').addEventListener('click',()=>{
  data.settings.sound = !data.settings.sound;
  saveData();
  render();
});

document.getElementById('togCheer').addEventListener('click',()=>{
  data.settings.cheer = !data.settings.cheer;
  saveData();
  render();
});

document.getElementById('togVibrate').addEventListener('click',()=>{
  data.settings.vibrate = !data.settings.vibrate;
  saveData();
  render();
});

plus10Btn.addEventListener('click',()=>addSquat(10));
floatBtn.addEventListener('click',()=>{
  if(!isDragging && currentPage==='home') addSquat(1);
});

function ymd(d=new Date()){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function getCount(day){ return data.records[day] || 0; }

function setCount(day,count){
  data.records[day] = Math.max(0,count);
  if(data.records[day]===0) delete data.records[day];
}

function loadData(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return clone(defaultData);
    const parsed = JSON.parse(raw);
    return {
      ...clone(defaultData),
      ...parsed,
      records:{...defaultData.records,...(parsed.records||{})},
      settings:{...defaultData.settings,...(parsed.settings||{})}
    };
  }catch(e){
    return clone(defaultData);
  }
}

function saveData(){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function randomFrom(arr){
  if(!arr || arr.length===0) return '';
  return arr[Math.floor(Math.random()*arr.length)];
}

function getEventLine(){
  if(data.settings.voice==='male') return randomFrom(MALE_LINES);
  if(data.settings.voice==='baby') return randomFrom(BABY_LINES);
  return randomFrom(FEMALE_LINES);
}

function speak(text){
  if(!data.settings.sound || data.settings.voice==='mute') return;
  try{
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'ko-KR';

    if(data.settings.voice==='male'){
      msg.pitch = 0.82;
      msg.rate = 0.78;
    }else if(data.settings.voice==='baby'){
      msg.pitch = 1.7;
      msg.rate = 0.98;
    }else{
      msg.pitch = 1.05;
      msg.rate = 0.80;
    }

    const voices = speechSynthesis.getVoices();
    const ko = voices.find(v=>v.lang && v.lang.toLowerCase().includes('ko'));
    if(ko) msg.voice = ko;

    speechSynthesis.speak(msg);
  }catch(e){}
}

function showNotice(text){
  notice.textContent = text;
  notice.classList.add('show');
  clearTimeout(showNotice.t);
  showNotice.t = setTimeout(()=>notice.classList.remove('show'),1600);
}

function addSquat(amount=1){
  const day = ymd();
  const before = getCount(day);
  setCount(day, before + amount);

  if(data.settings.vibrate && navigator.vibrate){
    navigator.vibrate(amount===10 ? [25,40,25] : 25);
  }

  const after = getCount(day);

  if(data.settings.sound && data.settings.voice!=='mute'){
    if(after % EVENT_STEP !== 0){
  speak(String(after));
}
  }

  if(data.settings.cheer){
    const beforeStep = Math.floor(before / EVENT_STEP);
    const afterStep = Math.floor(after / EVENT_STEP);
    if(afterStep > beforeStep){
      const line = getEventLine();
      if(line){
        showNotice(line);
        if(data.settings.sound && data.settings.voice!=='mute'){
          speak(line);
        }
      }
    }
  }

  saveData();
  render();
}

function monthDays(base=new Date()){
  const y = base.getFullYear();
  const m = base.getMonth();
  const last = new Date(y,m+1,0).getDate();
  const arr = [];
  for(let i=1;i<=last;i++) arr.push(new Date(y,m,i));
  return arr;
}
let viewDate = new Date();
function monthTotal(date=new Date()){
  const y = date.getFullYear();
  const m = date.getMonth()+1;
  let sum = 0;
  for(const k in data.records){
    if(k.startsWith(`${y}-${String(m).padStart(2,'0')}-`)) sum += data.records[k];
  }
  return sum;
}

function yearTotal(date=new Date()){
  const y = `${date.getFullYear()}-`;
  let sum = 0;
  for(const k in data.records){
    if(k.startsWith(y)) sum += data.records[k];
  }
  return sum;
}

function allTotal(){
  return Object.values(data.records).reduce((a,b)=>a+b,0);
}

function dayMax(){
  let max = 0;
  for(const k in data.records){
    if(data.records[k] > max) max = data.records[k];
  }
  return max;
}

function calcStreaks(){
  const keys = Object.keys(data.records).filter(k=>data.records[k]>0).sort();
  if(keys.length===0) return {current:0,best:0};

  let best = 1;
  let cur = 1;

  for(let i=1;i<keys.length;i++){
    const prev = new Date(keys[i-1]);
    const curr = new Date(keys[i]);
    const diff = (curr-prev)/86400000;
    if(diff===1){
      cur++;
      best=Math.max(best,cur);
    }else{
      cur=1;
    }
  }

  let current = 0;
  const today = new Date(ymd());
  for(let i=0;;i++){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    if(getCount(ymd(d))>0) current++;
    else break;
  }

  return {current,best};
}

function weekTotal(){
  const today = new Date();
  let sum = 0;
  for(let i=0;i<7;i++){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    sum += getCount(ymd(d));
  }
  return sum;
}

function bubbleSize(count,max){
  if(count<=0) return 0;
  const minSize = 24;
  const maxSize = 38;
  const ratio = Math.sqrt(count/Math.max(1,max));
  return Math.round(minSize + (maxSize-minSize)*ratio);
}

function renderCalendar(){
  const heads = document.getElementById('calendarHeads');
  const grid = document.getElementById('calendarGrid');
  heads.innerHTML = '';
  grid.innerHTML = '';

  ['일','월','화','수','목','금','토'].forEach(name=>{
    const h = document.createElement('div');
    h.className = 'cal-head';
    h.textContent = name;
    heads.appendChild(h);
  });

  const base = viewDate;
  const y = base.getFullYear();
  const m = base.getMonth();
  const firstDay = new Date(y,m,1).getDay();
  const days = monthDays(base);
  const counts = days.map(d=>getCount(ymd(d)));
  const maxCount = Math.max(1,...counts);
  const todayKey = ymd();

  for(let i=0;i<firstDay;i++){
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
  }

  days.forEach(d=>{
    const key = ymd(d);
    const count = getCount(key);
    const el = document.createElement('div');
    el.className = 'day';

    const wrap = document.createElement('div');
    wrap.className = 'day-bubble-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'day-bubble';
    bubble.style.width = (count>0 ? bubbleSize(count,maxCount) : 24) + 'px';
    bubble.style.height = (count>0 ? bubbleSize(count,maxCount) : 24) + 'px';
    bubble.textContent = d.getDate();

    if(key===todayKey){
      bubble.style.outline = '2px solid #8d4dff';
      bubble.style.outlineOffset = '1px';
    }

    if(count===0){
      bubble.style.background = '#f7f3fa';
      bubble.style.color = '#b6a8c4';
    }

    wrap.appendChild(bubble);

    const cnt = document.createElement('div');
    cnt.className = 'day-count';
    cnt.textContent = count>0 ? String(count) : '';

    el.appendChild(wrap);
    el.appendChild(cnt);
    grid.appendChild(el);
  });
}

function getDailySeries(){
  const today = new Date();
  const arr = [];
  for(let i=6;i>=0;i--){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    arr.push({label:`${d.getMonth()+1}/${d.getDate()}`, value:getCount(ymd(d))});
  }
  return arr;
}

function getMonthlySeries(){
  const arr = [];
  const today = new Date();
  for(let i=5;i>=0;i--){
    const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
    const y = d.getFullYear();
    const m = d.getMonth()+1;
    let sum = 0;
    for(const k in data.records){
      if(k.startsWith(`${y}-${String(m).padStart(2,'0')}-`)) sum += data.records[k];
    }
    arr.push({label:`${m}월`, value:sum});
  }
  return arr;
}

function getYearlySeries(){
  const arr = [];
  const today = new Date();
  for(let i=2;i>=0;i--){
    const y = today.getFullYear()-i;
    let sum = 0;
    for(const k in data.records){
      if(k.startsWith(String(y))) sum += data.records[k];
    }
    arr.push({label:`${y}`, value:sum});
  }
  return arr;
}

function renderChart(){
  const wrap = document.getElementById('chartWrap');
  wrap.innerHTML = '';

  document.querySelectorAll('.graph-chip').forEach(ch=>{
    ch.classList.toggle('active', ch.dataset.graph===data.graphMode);
  });

  let arr = [];
  if(data.graphMode==='month') arr = getMonthlySeries();
  else if(data.graphMode==='year') arr = getYearlySeries();
  else arr = getDailySeries();

  const max = Math.max(1,...arr.map(x=>x.value));

  arr.forEach(item=>{
    const h = Math.max(8, Math.round((item.value/max)*100));
    const div = document.createElement('div');
    div.className = 'barItem';
    div.innerHTML =
      `<div class="barVal">${item.value}</div>
       <div class="barCol" style="height:${h}px"></div>
       <div class="barLbl">${item.label}</div>`;
    wrap.appendChild(div);
  });
}

function setToggle(id,on){
  document.getElementById(id).classList.toggle('on', !!on);
}

function updateFloatingVisibility(){
  floatBtn.style.display = currentPage==='home' ? 'block' : 'none';
}

function render(){
  const today = getCount(ymd());
  const mTotal = monthTotal();
  const yTotal = yearTotal();
  const total = allTotal();
  const streak = calcStreaks();

  const now = new Date();
  const startDate = new Date('2026-02-19');
  const diffDays = Math.floor((now - startDate) / 86400000) + 1;
  const dayOfYear = diffDays < 1 ? 1 : diffDays;
  let totalDays = dayOfYear;

  // 기존 데이터 로직을 활용하여 계산
  const monthAvg = Math.round(mTotal / (new Date().getDate()) || 0);
  const yearAvg = Math.round(yTotal / dayOfYear || 0);
  const allAvg = Math.round(total / totalDays || 0);

  document.getElementById('todayGoalNow').textContent = today;
  document.getElementById('monthGoalNow').textContent = mTotal;
  document.getElementById('heroCount').textContent = today;
  document.getElementById('monthAvg').textContent = monthAvg.toLocaleString();
  document.getElementById('yearAvg').textContent = yearAvg.toLocaleString();
  document.getElementById('allAvg').textContent = allAvg.toLocaleString();
  document.getElementById('dayMax').textContent = dayMax().toLocaleString();
  document.getElementById('monthTotal').textContent = mTotal.toLocaleString();
  document.getElementById('allTotal').textContent = total.toLocaleString();
  document.getElementById('currentStreak').textContent = streak.current;
  document.getElementById('bestStreak').textContent = streak.best;
  document.getElementById('statsToday').textContent = today.toLocaleString();
  document.getElementById('weekTotal').textContent = weekTotal().toLocaleString();
  document.getElementById('statsMonth').textContent = mTotal.toLocaleString();
  document.getElementById('statsAllTotal').textContent = total.toLocaleString();

  const todayPct = Math.round((today / Math.max(1, data.todayGoal)) * 100);
const monthPct = Math.round((mTotal / Math.max(1, data.monthGoal)) * 100);
  document.getElementById('todayBar').style.width = todayPct + '%';
  document.getElementById('monthBar').style.width = monthPct + '%';
  document.getElementById('monthPercent').textContent = monthPct + '%';
  document.getElementById('todayPercent').textContent = todayPct + '%';

  setToggle('togAuto',data.settings.autoCount);
  setToggle('togSound',data.settings.sound);
  setToggle('togCheer',data.settings.cheer);
  setToggle('togVibrate',data.settings.vibrate);

  document.querySelectorAll('.voice-chip').forEach(chip=>{
    chip.classList.toggle('active', chip.dataset.voice===data.settings.voice);
  });

  renderCalendar();
  renderChart();
  updateFloatingVisibility();
}

window.addEventListener('devicemotion', function(e){
  if(!data.settings.autoCount) return;
  if(document.hidden) return;
  if(currentPage!=='home') return;

  const acc = e.accelerationIncludingGravity;
  if(!acc) return;

  const x = acc.x || 0;
  const y = acc.y || 0;
  const z = acc.z || 0;
  const mag = Math.sqrt(x*x + y*y + z*z);
  const now = Date.now();

  if(auto.base===null){
    auto.base = mag;
    auto.stage = 'idle';
    auto.lowDelta = 0;
    auto.highDelta = 0;
    return;
  }

  auto.base = auto.base * 0.985 + mag * 0.015;
  const delta = mag - auto.base;

  // 1. 충분히 내려감
  if(auto.stage==='idle'){
    if(delta < -1.9){
      auto.stage = 'down';
      auto.downTime = now;
      auto.lowDelta = delta;
    }
    return;
  }

  // 2. 내려간 뒤 충분히 올라옴
  if(auto.stage==='down'){
    if(delta < auto.lowDelta) auto.lowDelta = delta;

    if(now - auto.downTime > 2200){
      auto.stage = 'idle';
      return;
    }

    if(delta > 1.4 && now - auto.downTime > 300){
      auto.stage = 'up';
      auto.upTime = now;
      auto.highDelta = delta;
    }
    return;
  }

  // 3. 올라온 뒤 흔들림이 안정될 때만 1개
  if(auto.stage==='up'){
    if(delta > auto.highDelta) auto.highDelta = delta;

    if(now - auto.upTime > 1800){
      auto.stage = 'idle';
      return;
    }

    if(
      delta > -0.2 &&
      delta < 0.8 &&
      now - auto.upTime > 180 &&
      now - auto.lastCountTime > 1400
    ){
      auto.lastCountTime = now;
      auto.stage = 'idle';
      addSquat(1);
    }
  }
});

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    auto.base = null;
    auto.stage = 'idle';
  }
});

(function(){
  const btn = floatBtn;
  btn.style.right = '12px';
  btn.style.bottom = '16px';

  btn.addEventListener('touchstart',e=>{
    if(currentPage!=='home') return;
    isDragging = false;
    const t = e.touches[0];
    dragStartX = t.clientX;
    dragStartY = t.clientY;
    const rect = btn.getBoundingClientRect();
    btnStartX = rect.left;
    btnStartY = rect.top;
  },{passive:true});

  btn.addEventListener('touchmove',e=>{
    if(currentPage!=='home') return;
    const t = e.touches[0];
    const dx = t.clientX - dragStartX;
    const dy = t.clientY - dragStartY;

    if(Math.abs(dx)>8 || Math.abs(dy)>8) isDragging = true;

    if(isDragging){
      e.preventDefault();
      btn.style.left = Math.max(0, Math.min(window.innerWidth-150, btnStartX+dx)) + 'px';
      btn.style.top = Math.max(0, Math.min(window.innerHeight-150, btnStartY+dy)) + 'px';
      btn.style.right = 'auto';
      btn.style.bottom = 'auto';
    }
  },{passive:false});

  btn.addEventListener('touchend',()=>{
    setTimeout(()=>{ isDragging = false; },30);
  });
})();

  render();

function backupData(){
  const data = JSON.stringify(localStorage);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'squat_backup.json';
  a.click();
}

function restoreData(){
  document.getElementById('restoreFile').click();
}

document.getElementById('restoreFile').addEventListener('change', function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(){
    const data = JSON.parse(reader.result);
    for (let key in data){
      localStorage.setItem(key, data[key]);
    }
    location.reload();
  }

  reader.readAsText(file);
});
render();
